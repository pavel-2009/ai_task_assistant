# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 20

    env:
      SECRET_KEY: test-secret-key
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      CELERY_INIT_SERVICES_ON_STARTUP: "true"
      USE_ONNX: "false"
      LLM_API_KEY: "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"
      LLM_BASE_URL: "https://openrouter.ai/api/v1"
      LLM_MODEL: "meta-llama/llama-3.2-3b-instruct:free"

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r prod_req.txt
          python -m spacy download en_core_web_sm
          
      - name: Start services
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          celery -A app.celery_app worker --loglevel=info --pool=solo &
          sleep 15
          
      - name: Run tests
        run: pytest tests/ -v --tb=short