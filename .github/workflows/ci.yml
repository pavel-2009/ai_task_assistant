name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key
      DATABASE_URL: sqlite+aiosqlite:///./ci_test.db
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      LLM_API_KEY: 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
      TEST_BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r prod_req.txt
          pip install pytest pytest-cov

      - name: Start Celery worker
        run: |
          celery -A app.celery_app worker --loglevel=info --pool=solo > celery.log 2>&1 &
          echo $! > celery.pid

      - name: Start FastAPI app
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for app startup
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/ping >/dev/null; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          tail -n 200 app.log || true
          exit 1

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "========== app.log =========="
          cat app.log || true
          echo "========== celery.log =========="
          cat celery.log || true

      - name: Stop background services
        if: always()
        run: |
          kill "$(cat app.pid)" 2>/dev/null || true
          kill "$(cat celery.pid)" 2>/dev/null || true
