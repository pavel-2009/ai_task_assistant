# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 20

    env:
      SECRET_KEY: test-secret-key
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      CELERY_INIT_SERVICES_ON_STARTUP: "true"
      USE_ONNX: "false"
      LLM_API_KEY: "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"
      LLM_BASE_URL: "http://127.0.0.1:9999"
      LLM_MODEL: "disabled-in-ci"

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r prod_req.txt
          python -m spacy download en_core_web_sm
          
      - name: Start services (Redis -> Celery -> Uvicorn)
        run: |
          set -euo pipefail

          redis_ready=false
          for i in {1..30}; do
            if redis-cli -h localhost -p 6379 ping | grep -q PONG; then
              redis_ready=true
              echo "Redis is ready"
              break
            fi
            echo "Waiting for Redis..."
            sleep 2
          done
          if [ "$redis_ready" = false ]; then
            echo "Redis did not become ready in time"
            exit 1
          fi

          celery -A app.celery_app worker --loglevel=info --pool=solo &
          sleep 40

          uvicorn app.main:app --host 0.0.0.0 --port 8000 &

          app_ready=false
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:8000/ping >/tmp/ping.json; then
              python - <<'PY2'
import json
from pathlib import Path
resp = json.loads(Path("/tmp/ping.json").read_text())
print(resp)
if not resp.get("models_ready"):
    raise SystemExit("Services were not initialized: models_ready=false")
PY2
              app_ready=true
              echo "Application services initialized"
              break
            fi
            echo "Waiting for application startup..."
            sleep 2
          done
          if [ "$app_ready" = false ]; then
            echo "Application did not start in time"
            exit 1
          fi
          
      - name: Run tests
        run: pytest tests/ --cov=. -v --tb=short
