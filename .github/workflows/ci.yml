name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      CELERY_BROKER_URL: ${{ secrets.CELERY_BROKER_URL }}
      CELERY_RESULT_BACKEND: ${{ secrets.CELERY_RESULT_BACKEND }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_TIMEOUT_SECONDS: ${{ secrets.LLM_TIMEOUT_SECONDS }}
      JWT_EXPIRE_MINUTES: ${{ secrets.JWT_EXPIRE_MINUTES }}
      JWT_ALGORITHM: ${{ secrets.JWT_ALGORITHM }}
      USE_ONNX: ${{ secrets.USE_ONNX }}
      CELERY_INIT_SERVICES_ON_STARTUP: ${{ secrets.CELERY_INIT_SERVICES_ON_STARTUP }}
      MAX_IMAGE_SIZE_PX: ${{ secrets.MAX_IMAGE_SIZE_PX }}
      DEFAULT_TOP_K: ${{ secrets.DEFAULT_TOP_K }}
      FRAME_CACHE_SIZE: ${{ secrets.FRAME_CACHE_SIZE }}
      YOLO_CONF_THRESHOLD: ${{ secrets.YOLO_CONF_THRESHOLD }}
      YOLO_IOU_THRESHOLD: ${{ secrets.YOLO_IOU_THRESHOLD }}
      RATE_LIMIT_REQUESTS: ${{ secrets.RATE_LIMIT_REQUESTS }}
      RATE_LIMIT_PERIOD_SECONDS: ${{ secrets.RATE_LIMIT_PERIOD_SECONDS }}
      METRICS_ENABLED: ${{ secrets.METRICS_ENABLED }}
      METRICS_PATH: ${{ secrets.METRICS_PATH }}
      PYTHONUNBUFFERED: ${{ secrets.PYTHONUNBUFFERED }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare CI env file
        shell: bash
        run: |
          cat > .env.ci <<EOF
          POSTGRES_USER=${POSTGRES_USER:-postgres}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
          POSTGRES_DB=${POSTGRES_DB:-postgres}
          DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:password@postgres:5432/postgres}
          REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
          CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
          CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
          SECRET_KEY=${SECRET_KEY:-ci-secret-key}
          LLM_API_KEY=${LLM_API_KEY:-ci-llm-key}
          LLM_BASE_URL=${LLM_BASE_URL:-https://openrouter.ai/api/v1}
          LLM_MODEL=${LLM_MODEL:-meta-llama/llama-3.3-8b-instruct:free}
          LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-60}
          JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-60}
          JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
          USE_ONNX=${USE_ONNX:-false}
          CELERY_INIT_SERVICES_ON_STARTUP=${CELERY_INIT_SERVICES_ON_STARTUP:-false}
          MAX_IMAGE_SIZE_PX=${MAX_IMAGE_SIZE_PX:-1024}
          DEFAULT_TOP_K=${DEFAULT_TOP_K:-5}
          FRAME_CACHE_SIZE=${FRAME_CACHE_SIZE:-5}
          YOLO_CONF_THRESHOLD=${YOLO_CONF_THRESHOLD:-0.35}
          YOLO_IOU_THRESHOLD=${YOLO_IOU_THRESHOLD:-0.55}
          RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
          RATE_LIMIT_PERIOD_SECONDS=${RATE_LIMIT_PERIOD_SECONDS:-60}
          METRICS_ENABLED=${METRICS_ENABLED:-true}
          METRICS_PATH=${METRICS_PATH:-/metrics}
          PYTHONUNBUFFERED=${PYTHONUNBUFFERED:-1}
          EOF

      - name: Start docker compose stack
        shell: bash
        run: docker compose --env-file .env.ci up -d --build

      - name: Wait for app startup
        shell: bash
        run: |
          for i in {1..60}; do
            status_code="$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/ping || true)"
            if [ "$status_code" = "200" ] || [ "$status_code" = "503" ]; then
              echo "App is reachable with /ping status $status_code"
              exit 0
            fi
            sleep 20
          done
          echo "App did not start in time"
          docker compose --env-file .env.ci logs --tail=200
          exit 1

      - name: Run tests with coverage
        shell: bash
        run: docker compose --env-file .env.ci exec -T api pytest --cov=app --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Dump logs on failure
        if: failure()
        shell: bash
        run: docker compose --env-file .env.ci logs --tail=200

      - name: Stop background services
        if: always()
        shell: bash
        run: docker compose --env-file .env.ci down -v
