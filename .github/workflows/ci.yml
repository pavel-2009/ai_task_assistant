# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 20

    env:
      SECRET_KEY: test-secret-key
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      CELERY_INIT_SERVICES_ON_STARTUP: "false"
      USE_ONNX: "false"
      LLM_API_KEY: "dummy-ci-key"
      LLM_BASE_URL: "http://127.0.0.1:9999"
      LLM_MODEL: "disabled-in-ci"

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r prod_req.txt
          python -m spacy download en_core_web_sm
          
      - name: Start services (Redis -> Celery -> Uvicorn)
        run: |
          celery -A app.celery_app worker --loglevel=info --pool=solo &
          sleep 40
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 100
          
      - name: Run tests
        run: pytest tests/ --cov=. -v --tb=short
