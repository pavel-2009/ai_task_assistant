version: '3.9'

volumes:
  torch_cache:
  db_data:

services:
  # 1. Redis
  redis:
    image: redis:latest
    container_name: ai_task_assistant_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. API
  api:
    build: .
    container_name: ai_task_assistant_api
    ports:
      - "8000:8000"
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - db_data:/app/db
      - torch_cache:/root/.cache/torch
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/db/test.db
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: always

  # 3. Celery
  celery:
    build: .
    container_name: ai_task_assistant_celery
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    command: celery -A app.celery_app worker -B --loglevel=info
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - db_data:/app/db
      - torch_cache:/root/.cache/torch
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/db/test.db
    restart: always

  # 4. Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: ai_task_assistant_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
    restart: always
