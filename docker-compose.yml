version: '0.1'

services:
  api:
    build: .
    container_name: ai_task_assistant
    ports:
      - "8000:8000"
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - ./test.db:/app/test.db

    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=ab9bafa5578421297f7af89812af2a5c7126e2941f01c209f3ccb256b13916dc

    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000

  redis:
    image: redis:latest
    container_name: ai_task_assistant_redis
    ports:
      - "6379:6379"
    
  celery:
    build: .
    container_name: ai_task_assistant_celery
    depends_on:
      - redis
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=ab9bafa5578421297f7af89812af2a5c7126e2941f01c209f3ccb256b13916dc
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A app.ml.tasks worker --loglevel=info
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints