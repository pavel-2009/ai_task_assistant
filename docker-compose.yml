version: '3.9'

volumes:
  torch_cache:
  db_data:

services:
  # 1. Redis
  redis:
    image: redis:latest
    container_name: ai_task_assistant_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. API
  api:
    build: .
    container_name: ai_task_assistant_api
    ports:
      - "8000:8000"
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - ./test.db:/app/test.db
      - torch_cache:/root/.cache/torch
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: always

  # 3. Celery
  celery:
    build: .
    container_name: ai_task_assistant_celery
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    command: celery -A app.celery_app worker -B --loglevel=info
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - ./test.db:/app/test.db
      - torch_cache:/root/.cache/torch
    restart: always
