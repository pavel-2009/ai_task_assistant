version: '3.9'

volumes:
  torch_cache:

services:
  redis:
    image: redis:latest
    container_name: ai_task_assistant_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    container_name: ai_task_assistant_api
    ports:
      - "8000:8000"
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - db_data:/app/db
      - torch_cache:/root/.cache/torch
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: always
    depends_on:
      - redis
    mem_limit: 3g     # или 2g, если нужно

  celery:
    build: .
    container_name: ai_task_assistant_celery
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - db_data:/app/db
      - torch_cache:/root/.cache/torch
    restart: always
    depends_on:
      - redis
    shm_size: 2g                  # ← Очень важно для PyTorch!
    mem_limit: 4g                 # ← Увеличил, было мало

networks:
  default:
    name: app_network