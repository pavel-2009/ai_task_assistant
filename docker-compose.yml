version: '3.9'

volumes:
  torch_cache:
  ollama_data:
  db_data:

services:
  # 1. Redis
  redis:
    image: redis:latest
    container_name: ai_task_assistant_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 2. Ollama - просто запускаем, модель скачаем руками
  ollama:
    image: ollama/ollama:latest
    container_name: ai_task_assistant_ollama
    ports:
      - "11434:11434"
    network_mode: "host"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    dns:
    - 8.8.8.8
    - 8.8.4.4
    - 1.1.1.1

  # 3. API
  api:
    build: .
    container_name: ai_task_assistant_api
    ports:
      - "8000:8000"
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - ./test.db:/app/test.db
      - torch_cache:/root/.cache/torch
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: always

  # 4. Celery
  celery:
    build: .
    container_name: ai_task_assistant_celery
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    command: celery -A app.celery_app worker -B --loglevel=info
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - ./test.db:/app/test.db
      - torch_cache:/root/.cache/torch
    restart: always