version: '0.1'

volumes:
  torch_cache:

services:
  api:
    build: .
    container_name: ai_task_assistant
    ports:
      - "8000:8000"
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - ./test.db:/app/test.db
      - torch_cache:/root/.cache/torch

    env_file:
      - .env

    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000

  redis:
    image: redis:latest
    container_name: ai_task_assistant_redis
    ports:
      - "6379:6379"
    
  celery:
    build: .
    container_name: ai_task_assistant_celery
    depends_on:
      - redis
    env_file:
      - .env
    command: celery -A app.ml.cv.tasks worker --loglevel=info
    volumes:
      - ./avatars:/app/avatars
      - ./checkpoints:/app/checkpoints
      - torch_cache:/root/.cache/torch